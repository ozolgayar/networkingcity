<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта курса — Есть контакт!</title>
  <link rel="stylesheet" href="map.css">
</head>
<body>

<div class="map-page">

  <!-- Шапка -->
  <div class="map-header">
    <a href="index.html" class="map-back">← На главную</a>
    <h1 class="map-title">Карта курса</h1>
    <div></div>
  </div>

  <!-- Подзаголовок -->
  <p class="map-subtitle">Пройди все три модуля — и соберётся рукопожатие!</p>

  <!-- ===== ГЛАВНАЯ СЦЕНА ===== -->
  <div class="handshake-scene">
    <div class="scene-ring scene-ring-1"></div>
<div class="scene-ring scene-ring-2"></div>
<div class="scene-ring scene-ring-3"></div>
<div class="scene-ring scene-ring-4"></div>

    <!-- ЧАСТИЦЫ ФОН -->
    <div class="particles" id="particles"></div>

    <!-- РУКОПОЖАТИЕ -->
    <div class="handshake-wrap" id="handshake-wrap">

      <!-- ЛЕВАЯ РУКА — Модуль 1 -->
      <div class="hand-block left-block" id="block-1">
        <div class="module-badge" id="badge-1">
          <span class="badge-num">1</span>
          <span class="badge-lock" id="lock-1">🔒</span>
        </div>
        <svg class="hand-svg hand-svg-left" id="hand-svg-1"
             viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Рукав -->
          <rect x="45" y="130" width="70" height="90" rx="14" class="sleeve"/>
          <!-- Манжет -->
          <rect x="38" y="118" width="84" height="26" rx="10" class="cuff"/>
          <!-- Ладонь -->
          <ellipse cx="80" cy="112" rx="38" ry="32" class="palm"/>
          <!-- Пальцы -->
          <rect x="42" y="68" width="18" height="50" rx="9" class="finger"/>
          <rect x="62" y="56" width="18" height="62" rx="9" class="finger"/>
          <rect x="82" y="56" width="18" height="62" rx="9" class="finger"/>
          <rect x="102" y="64" width="18" height="54" rx="9" class="finger"/>
          <!-- Большой палец -->
          <ellipse cx="32" cy="106" rx="12" ry="20" class="thumb"
                   transform="rotate(-25 32 106)"/>
        </svg>
        <div class="hand-label">
          <strong>Модуль 1</strong>
          <span>Подготовка к нетворкингу</span>
        </div>
      </div>

      <!-- ЦЕНТР — вспышка + эмодзи рукопожатия -->
      <div class="center-flash" id="center-flash">
        <div class="flash-ring" id="flash-ring"></div>
        <div class="flash-emoji" id="flash-emoji">🤝</div>
        <div class="flash-text" id="flash-text">Контакт установлен!</div>
      </div>

      <!-- ПРАВАЯ РУКА — Модуль 2 -->
      <div class="hand-block right-block" id="block-2">
        <div class="module-badge" id="badge-2">
          <span class="badge-num">2</span>
          <span class="badge-lock" id="lock-2">🔒</span>
        </div>
        <svg class="hand-svg hand-svg-right" id="hand-svg-2"
             viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
          <rect x="45" y="130" width="70" height="90" rx="14" class="sleeve"/>
          <rect x="38" y="118" width="84" height="26" rx="10" class="cuff"/>
          <ellipse cx="80" cy="112" rx="38" ry="32" class="palm"/>
          <rect x="100" y="68" width="18" height="50" rx="9" class="finger"/>
          <rect x="80" y="56" width="18" height="62" rx="9" class="finger"/>
          <rect x="60" y="56" width="18" height="62" rx="9" class="finger"/>
          <rect x="40" y="64" width="18" height="54" rx="9" class="finger"/>
          <ellipse cx="128" cy="106" rx="12" ry="20" class="thumb"
                   transform="rotate(25 128 106)"/>
        </svg>
        <div class="hand-label">
          <strong>Модуль 2</strong>
          <span>Навыки нетворкинга</span>
        </div>
      </div>

    </div><!-- /handshake-wrap -->

    <!-- МОДУЛЬ 3 — снизу по центру -->
    <div class="module3-wrap" id="block-3">
      <div class="module3-connector" id="connector-3"></div>
      <div class="module3-circle" id="circle-3">
        <span class="badge-num">3</span>
        <span class="badge-lock" id="lock-3">🔒</span>
      </div>
      <div class="module3-label">
        <strong>Модуль 3</strong>
        <span>Удержание связей</span>
      </div>
    </div>

    <!-- КОНФЕТТИ -->
    <div class="confetti-wrap" id="confetti-wrap"></div>

  </div><!-- /handshake-scene -->

  <!-- Прогресс -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Прогресс курса</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-modules">
      <span id="done-count">0 из 3 модулей пройдено</span>
    </div>
  </div>

  <!-- Цитата -->
  <div class="map-quote">
    «Ваша сеть — это ваш капитал»
    <span>— Поршия Маунт</span>
  </div>

</div><!-- /map-page -->

<!-- ===== ТЕСТ-ПАНЕЛЬ (удали в продакшне) ===== -->
<div class="test-panel">
  <button onclick="completeModule(1)">✅ М1 пройден</button>
  <button onclick="completeModule(2)">✅ М2 пройден</button>
  <button onclick="completeModule(3)">✅ М3 пройден</button>
  <button onclick="resetAll()" style="background:#ef4444">🔄 Сброс</button>
</div>

<script>
// ===== СОСТОЯНИЕ =====
const state = { 1: false, 2: false, 3: false };

const COLORS = {
  locked:  { main: '#d1d5db', glow: 'none',                     text: '#9ca3af' },
  active:  { main: '#22c55e', glow: '0 0 20px rgba(34,197,94,0.6)', text: '#166534' },
  done:    { main: '#16884F', glow: '0 0 30px rgba(22,136,79,0.9) , 0 0 60px rgba(22,136,79,0.4)', text: '#fff' },
};

// ===== ПРИМЕНИТЬ СОСТОЯНИЕ =====
function applyState() {
  const done = [1,2,3].filter(n => state[n]);
  const pct  = Math.round(done.length / 3 * 100);

  // Прогресс
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('done-count').textContent    =
    done.length + ' из 3 модулей пройдено';

  // Руки 1 и 2
  [1, 2].forEach(n => {
    const svg    = document.getElementById('hand-svg-' + n);
    const lock   = document.getElementById('lock-' + n);
    const isDone = state[n];

    // Цвет всех частей SVG
    svg.querySelectorAll('.sleeve,.cuff,.palm,.finger,.thumb').forEach(el => {
      el.style.fill = isDone ? COLORS.done.main : COLORS.locked.main;
      el.style.transition = 'fill 0.8s ease';
    });

    // Свечение
    svg.style.filter = isDone
      ? 'drop-shadow(0 0 16px rgba(34,197,94,0.9))'
      : 'none';
    svg.style.transition = 'filter 0.8s ease';

    // Замок
    lock.textContent = isDone ? '✅' : '🔒';
  });

  // Модуль 3
  const circ  = document.getElementById('circle-3');
  const lock3 = document.getElementById('lock-3');
  const conn  = document.getElementById('connector-3');

  circ.classList.toggle('circle-done',   state[3]);
  circ.classList.toggle('circle-locked', !state[3]);
  lock3.textContent = state[3] ? '✅' : '🔒';
  conn.classList.toggle('connector-active', state[2] || state[3]);

  // Финал
  if (state[1] && state[2] && state[3]) {
    triggerFinale();
  }
}

// ===== ФИНАЛ =====
function triggerFinale() {
  const wrap = document.getElementById('handshake-wrap');

  // Руки сближаются
  wrap.classList.add('hands-together');

  setTimeout(() => {
    // Вспышка
    document.getElementById('flash-ring').classList.add('ring-burst');
    document.getElementById('flash-emoji').classList.add('emoji-show');
    document.getElementById('flash-text').classList.add('text-show');
    // Конфетти
    spawnConfetti();
    // Частицы ускорить
    document.getElementById('particles').classList.add('particles-active');
  }, 700);
}

// ===== КОНФЕТТИ =====
function spawnConfetti() {
  const wrap   = document.getElementById('confetti-wrap');
  const colors = ['#22c55e','#16884F','#fbbf24','#34d399','#86efac','#ffffff','#a3e635'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 10;
    el.style.cssText = `
      left: ${10 + Math.random() * 80}%;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
      animation-delay: ${Math.random() * 1.2}s;
      animation-duration: ${1.8 + Math.random() * 2}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    wrap.appendChild(el);
  }
}

// ===== ЧАСТИЦЫ ФОН =====
function createParticles() {
  const wrap = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      top:  ${Math.random() * 100}%;
      width:  ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
      animation-delay:    ${Math.random() * 6}s;
      animation-duration: ${4 + Math.random() * 6}s;
      opacity: ${0.2 + Math.random() * 0.4};
    `;
    wrap.appendChild(el);
  }
}

// ===== ТЕСТ =====
function completeModule(n) {
  state[n] = true;
  applyState();
}
function resetAll() {
  state[1] = state[2] = state[3] = false;
  document.getElementById('handshake-wrap').classList.remove('hands-together');
  document.getElementById('flash-ring').classList.remove('ring-burst');
  document.getElementById('flash-emoji').classList.remove('emoji-show');
  document.getElementById('flash-text').classList.remove('text-show');
  document.getElementById('confetti-wrap').innerHTML = '';
  document.getElementById('particles').classList.remove('particles-active');
  applyState();
}

// Старт
createParticles();
applyState();
</script>
</body>
</html>
