<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта курса</title>
  <link rel="stylesheet" href="map.css">
</head>
<body>

<div class="map-page">

  <!-- ШАПКА -->
  <header class="map-header">
    <a href="index.html" class="map-back">← Назад</a>
    <h1 class="map-title">Карта курса</h1>
    <div></div>
  </header>

  <!-- СБОРКА СОТОВ -->
  <div class="hc-cluster">

    <!-- ПЛЮМБОБ (иконка курса) — сверху по центру -->
    <div class="hc-plumbob">
      <!-- Заглушка плюмбоба — потом заменишь на <img src="images/plumbob.png"> -->
      <div class="plumbob-placeholder">
        <div class="plumbob-shape"></div>
      </div>
      <div class="plumbob-label">Есть контакт!</div>
    </div>

    <!-- ТРИ СОТЫ -->
    <div class="hc-trio">

      <!-- СОТА 1 — Подготовка -->
      <div class="hc-cell" id="hex-1" onclick="goModule(1)">
        <div class="hc-inner">
          <div class="hc-shine"></div>
          <div class="hc-content">
            <!-- Заглушка иконки — потом заменишь на <img src="images/module1.png"> -->
            <div class="hc-icon-placeholder">🎯</div>
            <div class="hc-name">Подготовка —<br>основа успеха</div>
            <div class="hc-status hc-done">✓ Пройден</div>
          </div>
        </div>
        <div class="hc-num-badge">01</div>
      </div>

      <!-- СОТА 2 — Есть контакт! -->
      <div class="hc-cell hc-locked" id="hex-2" onclick="goModule(2)">
        <div class="hc-inner">
          <div class="hc-shine"></div>
          <div class="hc-content">
            <!-- Заглушка иконки — потом заменишь на <img src="images/module2.png"> -->
            <div class="hc-icon-placeholder">🤝</div>
            <div class="hc-name">Есть<br>контакт!</div>
            <div class="hc-status hc-lock">🔒 Заблокирован</div>
          </div>
        </div>
        <div class="hc-num-badge">02</div>
      </div>

      <!-- СОТА 3 — На связи -->
      <div class="hc-cell hc-locked" id="hex-3" onclick="goModule(3)">
        <div class="hc-inner">
          <div class="hc-shine"></div>
          <div class="hc-content">
            <!-- Заглушка иконки — потом заменишь на <img src="images/module3.png"> -->
            <div class="hc-icon-placeholder">📡</div>
            <div class="hc-name">На<br>связи</div>
            <div class="hc-status hc-lock">🔒 Заблокирован</div>
          </div>
        </div>
        <div class="hc-num-badge">03</div>
      </div>

    </div><!-- /hc-trio -->

  </div><!-- /hc-cluster -->

  <!-- ПРОГРЕСС -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Прогресс курса</span>
      <span>33%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="progress-sub">Пройдено: <strong>1 из 3 модулей</strong></div>
  </div>

</div>

<!-- ТУЛТИП -->
<div class="hc-tooltip" id="tooltip"></div>

<script>
const MODULES = {
  1: { status: 'done',   href: 'module1.html' },
  2: { status: 'locked', href: '#' },
  3: { status: 'locked', href: '#' }
};

function goModule(num) {
  const m = MODULES[num];
  if (m.status === 'locked') {
    const el = document.getElementById('hex-' + num);
    el.classList.remove('hc-shake');
    void el.offsetWidth;
    el.classList.add('hc-shake');
    setTimeout(() => el.classList.remove('hc-shake'), 500);
    showTooltip('🔒 Сначала пройди предыдущий модуль!', el);
    return;
  }
  window.location.href = m.href;
}

let tipTimer;
function showTooltip(text, el) {
  const tip  = document.getElementById('tooltip');
  const rect = el.getBoundingClientRect();
  tip.textContent = text;
  tip.style.left  = (rect.left + rect.width / 2) + 'px';
  tip.style.top   = (rect.top - 50 + window.scrollY) + 'px';
  tip.classList.add('visible');
  clearTimeout(tipTimer);
  tipTimer = setTimeout(() => tip.classList.remove('visible'), 2200);
}

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('prog-fill').style.width = '33%';
  }, 400);
});
</script>

</body>
</html>
